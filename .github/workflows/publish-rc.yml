name: Publish RC

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'RC tag (e.g., v1.0.0rc1)'
        required: true
        type: string
      target:
        description: 'Publish target'
        required: true
        type: choice
        options:
          - pypi
          - mcp-registry
          - both

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate RC tag
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match RC pattern (e.g., v1.0.0rc1)"
            exit 1
          fi
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist"
            exit 1
          fi

          # Verify the main publish workflow already created a GitHub Release for this tag
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::No GitHub Release found for '$TAG'. Push the tag first to trigger the main publish workflow."
            exit 1
          fi
          echo "Validated RC tag: $TAG"

  build:
    needs: validate
    uses: ./.github/workflows/build.yml
    with:
      tag: ${{ inputs.tag }}

  build-mcpb:
    needs: validate
    if: inputs.target == 'mcp-registry' || inputs.target == 'both'
    uses: ./.github/workflows/build-mcpb.yml
    with:
      tag: ${{ inputs.tag }}

  publish-pypi:
    needs: build
    if: inputs.target == 'pypi' || inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    needs: [build-mcpb, publish-pypi]
    if: |
      always() &&
      (inputs.target == 'mcp-registry' || inputs.target == 'both') &&
      needs.build-mcpb.result == 'success' &&
      (needs.publish-pypi.result == 'success' || needs.publish-pypi.result == 'skipped')
    uses: ./.github/workflows/publish-mcp-registry.yml
    with:
      tag: ${{ inputs.tag }}
    permissions:
      id-token: write
